name: Test Idena-wasm-binding

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  artifact-security:
    name: Static library secret scan
    runs-on: ubuntu-24.04

    steps:
      - name: Get Sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.5
          cache: false

      - name: Install Gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1

      - name: Scan static libraries
        run: scripts/check-wasm-artifact-secrets.sh

  build:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        go-version: [1.26.5]
        os: ['ubuntu-24.04', 'windows-2025', 'macos-15-intel', 'macos-15']
    runs-on: ${{ matrix.os }}

    steps:
      - name: Get Sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Format
        shell: bash
        run: test -z "$(gofmt -l $(git ls-files '*.go'))"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v ./...

      - name: Vulnerability scan
        run: go tool govulncheck ./...
