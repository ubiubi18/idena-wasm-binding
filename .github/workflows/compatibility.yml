name: Legacy binding compatibility

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  legacy-binding-compatibility:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.5
          cache: true
      - name: Verify locked provenance
        run: python3 scripts/check-compatibility-lock.py
      - name: Verify archives and ABI fixtures
        run: go test ./tests
